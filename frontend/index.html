<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>LUMO GUIDE — 路上有光，盟友相伴</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>◈</text></svg>">

  <!-- CSS -->
  <link rel="stylesheet" href="/css/variables.css">
  <link rel="stylesheet" href="/css/app.css">
  <link rel="stylesheet" href="/css/components.css">

  <!-- Fonts: Noto Serif TC/SC for brand display, Ma Shan Zheng for welcome handwriting -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=ZCOOL+KuaiLe&family=Noto+Serif+SC:wght@400;600;700;900&family=Noto+Serif+TC:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- Vue 3 + Vue Router -->
  <script defer src="https://cdn.jsdelivr.net/npm/vue@3.4.38/dist/vue.global.js"
    integrity="sha384-WRCkrPcTVlHVnve6RlPL8tCU8PqAUXcxyIMIjpddtL45o+jJTBmFX2SJw88IOVo1" crossorigin="anonymous"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/vue-router@4.3.3/dist/vue-router.global.js"
    integrity="sha384-hfI5gRZfOvudG7M6zzZnVNneKHe4+M6QO9hSWwplvlkTf7d9RjYn4JJUz0tvQzJC" crossorigin="anonymous"></script>

  <!-- Utils (load order matters — defer preserves order) -->
  <script defer src="/js/utils/storage.js"></script>
  <script defer src="/js/utils/helpers.js"></script>

  <!-- i18n -->
  <script defer src="/js/i18n/zh-CN.js"></script>
  <script defer src="/js/i18n/zh-TW.js"></script>
  <script defer src="/js/i18n/en.js"></script>
  <script defer src="/js/i18n/index.js"></script>

  <!-- API -->
  <script defer src="/js/api/urls.js"></script>

  <!-- Components -->

  <script defer src="/js/components/empty-state.js"></script>
  <script defer src="/js/components/app-header.js"></script>
  <script defer src="/js/components/app-topbar.js"></script>

  <!-- Pages — Auth -->
  <script defer src="/js/pages/welcome.js"></script>
  <script defer src="/js/pages/auth/login.js"></script>
  <script defer src="/js/pages/auth/register.js"></script>
  <script defer src="/js/pages/auth/extra.js"></script>

  <script defer src="/js/pages/city/index.js"></script>
  <script defer src="/js/pages/city/detail.js"></script>

  <script defer src="/js/pages/mine/index.js"></script>
  <script defer src="/js/pages/mine/profile.js"></script>
  <script defer src="/js/pages/mine/extra.js"></script>
  <script defer src="/js/pages/address/list.js"></script>

  <script defer src="/js/pages/guide/certify.js"></script>
  <script defer src="/js/pages/guide/publish.js"></script>
  <script defer src="/js/pages/guide/publish-city.js"></script>
  <script defer src="/js/pages/guide/publish-city-form.js"></script>
  <script defer src="/js/pages/guide/bookings.js"></script>

  <script defer src="/js/pages/vip/index.js"></script>

  <script defer src="/js/pages/misc/web.js"></script>
  <script defer src="/js/pages/misc/download.js"></script>

  <!-- Router -->
  <script defer src="/js/router.js"></script>

  <script defer src="/js/app.js"></script>

<body>
  <div id="app">
    <!-- Initial loading state before Vue mounts -->
    <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:12px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC',sans-serif;background:#F9F9F6;">
      <div style="position:relative;width:56px;height:56px;display:flex;align-items:center;justify-content:center;">
        <div style="position:absolute;width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,#666FFF,#4A52E0);transform:rotate(45deg);box-shadow:0 6px 20px rgba(102,111,255,0.25);"></div>
        <span style="position:relative;z-index:2;color:#fff;font-size:24px;font-weight:800;font-family:'Georgia','Noto Serif TC','Noto Serif SC',serif;">盟</span>
      </div>
      <div style="font-size:17px;font-weight:700;color:#162539;letter-spacing:-0.3px;">LUMOGUIDE</div>
      <div style="font-size:12px;color:#9CA3AF;">路上有光，盟友相伴</div>
      <div style="width:28px;height:28px;border:3px solid rgba(0,0,0,.06);border-top-color:#666FFF;border-radius:50%;animation:spin 0.7s linear infinite;margin-top:8px;"></div>
      <style>@keyframes spin { to { transform: rotate(360deg); } }</style>
    </div>
  </div>
