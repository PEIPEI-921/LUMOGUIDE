<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Diagnose</title></head><body>
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<script>
try {
  document.write('<p>✅ Vue loaded: ' + typeof Vue + '</p>');
  document.write('<p>✅ Vue.version: ' + Vue.version + '</p>');
  document.write('<p>✅ createApp: ' + typeof Vue.createApp + '</p>');
  // Test template compilation
  const app = Vue.createApp({ template: '<div>Hello {{ msg }}</div>', data() { return { msg: 'World' } } });
  app.mount('#test');
} catch(e) {
  document.write('<p>❌ Error: ' + e.message + '</p>');
}
</script>
<div id="test">NOT REPLACED</div>
</body></html>
